<div class="container-fluid py-4 bg-dark min-vh-100">

  <!-- Navbar simple -->
  <div class="container mb-4">
    <div class="d-flex justify-content-between align-items-center text-white">
      <h4 class="fw-light m-0">Red Social</h4>

      <div class="d-flex gap-3">
        <a href="/posts" class="text-white text-decoration-none">Inicio</a>
        <a href="/profile" class="text-white text-decoration-none">Perfil</a>
        <a href="/login" class="text-white text-decoration-none">Salir</a>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- Crear post -->
    <div class="card post-card mb-4">
      <div class="card-body">

        <input type="text" class="form-control mb-2" placeholder="Título del post">

        <textarea class="form-control mb-2" rows="3" placeholder="¿Qué estás pensando?"></textarea>

        <div class="d-flex justify-content-between align-items-center">
          <input type="file" class="form-control w-50">

          <button class="btn btn-dark">
            Publicar
          </button>
        </div>

      </div>
    </div>

    <!-- Posts feed -->
    <div class="card post-card mb-3">
      <div class="card-body">
        <h6 class="mb-1">Usuario123</h6>
        <p class="mb-2 text-muted small">Hace 2 horas</p>

        <h5>Título del post</h5>
        <p>Este es un ejemplo de publicación en la red social.</p>

        <div class="d-flex gap-3">
          <button class="btn btn-sm btn-outline-light">👍 Me gusta</button>
          <button class="btn btn-sm btn-outline-light">💬 Comentar</button>
        </div>
      </div>
    </div>

    <div class="card post-card mb-3">
      <div class="card-body">
        <h6 class="mb-1">AnaDev</h6>
        <p class="mb-2 text-muted small">Hace 1 día</p>

        <h5>Mi primer post</h5>
        <p>Esto ya empieza a parecer una red social 😄</p>

        <div class="d-flex gap-3">
          <button class="btn btn-sm btn-outline-light">👍 Me gusta</button>
          <button class="btn btn-sm btn-outline-light">💬 Comentar</button>
        </div>
      </div>
    </div>

  </div>
</div>
